version: '3.8'
networks:
  coolify:
    external: true
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SOURCE_COMMIT=${SOURCE_COMMIT:-unknown}
    deploy:
      replicas: 3
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.deployment-testing-service.loadbalancer.server.port=3000"
      - "traefik.http.routers.deployment-testing-http.rule=Host(`test.intellsys.in`)"
      - "traefik.http.routers.deployment-testing-http.entrypoints=http"
      - "traefik.http.routers.deployment-testing-http.middlewares=https-redirect"
      - "traefik.http.routers.deployment-testing-https.rule=Host(`test.intellsys.in`)"
      - "traefik.http.routers.deployment-testing-https.entrypoints=https"
      - "traefik.http.routers.deployment-testing-https.tls=true"
      - "traefik.http.routers.deployment-testing-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.deployment-testing-https.service=deployment-testing-service"
      - "traefik.http.routers.deployment-testing-https.middlewares=security-headers,compress"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.X-Powered-By="
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.compress.compress=true"
      - "coolify.managed=true"
      - "coolify.applicationId=19"
      - "coolify.type=application"
